<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>온열질환 안전 안내</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #FF6B35;
      --orange-pale: #FFF0EB;
      --blue: #2563EB;
      --blue-light: #3B82F6;
      --blue-pale: #EFF6FF;
      --dark: #1A1A2E;
      --gray: #6B7280;
      --light: #F8F9FA;
      --white: #FFFFFF;
      --shadow: 0 8px 32px rgba(0,0,0,0.12);
      --radius: 20px;
    }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #FFF7F4 0%, #EFF6FF 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 60px 0;
    }
    .header {
      width: 100%;
      background: linear-gradient(135deg, var(--orange) 0%, #FF4500 100%);
      padding: 28px 24px 24px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: ''; position: absolute;
      top: -40px; right: -40px;
      width: 180px; height: 180px;
      background: rgba(255,255,255,0.08); border-radius: 50%;
    }
    .header::after {
      content: ''; position: absolute;
      bottom: -60px; left: -30px;
      width: 200px; height: 200px;
      background: rgba(255,255,255,0.06); border-radius: 50%;
    }
    .header-icon { font-size: 44px; display: block; margin-bottom: 8px; }
    .header h1 {
      color: white; font-size: 22px; font-weight: 800;
      letter-spacing: -0.5px; line-height: 1.3;
      position: relative; z-index: 1;
    }
    .header p {
      color: rgba(255,255,255,0.85); font-size: 13px;
      margin-top: 6px; position: relative; z-index: 1;
    }
    .container { width: 100%; max-width: 480px; padding: 32px 20px 0; }
    .menu-label {
      font-size: 12px; font-weight: 700; color: var(--gray);
      letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 16px;
    }
    .menu-grid { display: flex; flex-direction: column; gap: 16px; }
    .menu-card {
      background: var(--white); border-radius: var(--radius);
      padding: 24px 20px; cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      border: 2px solid transparent;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex; align-items: center; gap: 18px;
    }
    .menu-card:active { transform: scale(0.97); }
    .menu-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    .menu-card.orange { border-color: var(--orange); }
    .menu-card.orange:hover { background: var(--orange-pale); }
    .menu-card.blue { border-color: var(--blue); }
    .menu-card.blue:hover { background: var(--blue-pale); }
    .card-icon-wrap {
      width: 56px; height: 56px; border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; flex-shrink: 0;
    }
    .orange .card-icon-wrap { background: var(--orange-pale); }
    .blue   .card-icon-wrap { background: var(--blue-pale); }
    .card-text { flex: 1; }
    .card-text h2 { font-size: 17px; font-weight: 800; line-height: 1.3; margin-bottom: 4px; }
    .orange .card-text h2 { color: var(--orange); }
    .blue   .card-text h2 { color: var(--blue); }
    .card-text p { font-size: 12px; color: var(--gray); line-height: 1.5; }
    .card-arrow { font-size: 20px; color: #CBD5E1; flex-shrink: 0; }

    /* MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(4px);
      z-index: 100; align-items: flex-start; justify-content: center;
      padding: 0; overflow-y: auto;
    }
    .modal-overlay.active { display: flex; }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity:0; }
      to   { transform: translateY(0);    opacity:1; }
    }
    .modal-box {
      background: var(--white); border-radius: 24px;
      width: 100%; max-width: 480px;
      margin: 16px 16px 40px; overflow: hidden;
      display: flex; flex-direction: column;
      animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-header {
      padding: 18px 20px; display: flex; align-items: center;
      justify-content: space-between; border-bottom: 1px solid #F1F5F9;
      position: sticky; top: 0; background: white; z-index: 10;
    }
    .modal-title { font-size: 16px; font-weight: 800; color: var(--dark); }
    .modal-close {
      width: 32px; height: 32px; border-radius: 50%;
      background: #F1F5F9; border: none; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--gray); transition: background 0.15s;
    }
    .modal-close:hover { background: #E2E8F0; }
    .modal-body { padding: 16px; }

    #modal-heatstroke .modal-title { color: var(--orange); }
    .heatstroke-img { width: 100%; height: auto; display: block; border-radius: 8px; }

    #modal-contact .modal-title { color: var(--blue); }
    .contact-intro {
      font-size: 13px; color: var(--gray); margin-bottom: 20px;
      padding: 12px 16px; background: var(--blue-pale);
      border-radius: 12px; border-left: 4px solid var(--blue-light);
    }
    .contact-card {
      background: var(--light); border-radius: 16px; padding: 20px;
      margin-bottom: 14px; border: 1.5px solid #E2E8F0;
      transition: border-color 0.2s;
    }
    .contact-card:last-child { margin-bottom: 0; }
    .contact-card:hover { border-color: var(--blue-light); }
    .contact-role {
      font-size: 11px; font-weight: 700; color: var(--blue);
      letter-spacing: 0.8px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
    }
    .contact-role::before {
      content: ''; width: 6px; height: 6px;
      background: var(--blue); border-radius: 50%;
    }
    .contact-name { font-size: 20px; font-weight: 800; color: var(--dark); margin-bottom: 4px; }
    .contact-rank {
      display: inline-block; font-size: 12px; background: #DBEAFE;
      color: var(--blue); padding: 2px 10px; border-radius: 20px;
      font-weight: 600; margin-bottom: 12px;
    }
    .contact-phone-wrap { display: flex; align-items: center; gap: 10px; }
    .contact-phone {
      font-size: 22px; font-weight: 800; color: var(--dark);
      letter-spacing: 0.5px; text-decoration: none;
    }
    .call-btn {
      margin-left: auto; background: var(--blue); color: white;
      border: none; border-radius: 12px; padding: 10px 18px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      text-decoration: none; display: flex; align-items: center; gap: 6px;
      transition: background 0.15s, transform 0.1s;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .call-btn:hover { background: #1D4ED8; }
    .call-btn:active { transform: scale(0.96); }
    .footer {
      margin-top: 36px; text-align: center;
      font-size: 11px; color: #94A3B8; line-height: 1.8;
    }
  </style>
</head>
<body>

  <div class="header">
    <span class="header-icon">☀️</span>
    <h1>온열질환 안전 안내</h1>
    <p>응급조치 요령 및 비상연락망을 확인하세요</p>
  </div>

  <div class="container">
    <div class="menu-label">📋 안내 메뉴</div>
    <div class="menu-grid">
      <div class="menu-card orange" onclick="openModal('modal-heatstroke')">
        <div class="card-icon-wrap">🌡️</div>
        <div class="card-text">
          <h2>온열질환 응급조치 요령</h2>
          <p>증상 확인 및 단계별 응급처치 방법</p>
        </div>
        <span class="card-arrow">›</span>
      </div>
      <div class="menu-card blue" onclick="openModal('modal-contact')">
        <div class="card-icon-wrap">📞</div>
        <div class="card-text">
          <h2>비상연락망</h2>
          <p>보건·안전관리자 긴급 연락처</p>
        </div>
        <span class="card-arrow">›</span>
      </div>
    </div>
    <div class="footer">
      고용노동부 · 안전보건공단<br>
      폭염 시 온열질환 예방 안내
    </div>
  </div>

  <script>
    function openModal(id) {
      document.getElementById(id).classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
      document.body.style.overflow = '';
    }
    function closeOnOverlay(e, id) {
      if (e.target === document.getElementById(id)) closeModal(id);
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape')
        document.querySelectorAll('.modal-overlay.active').forEach(m => {
          m.classList.remove('active');
          document.body.style.overflow = '';
        });
    });
  </script>
